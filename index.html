<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartBudget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>SmartBudget</h1>
      <p>Управляйте доходами и расходами простым способом.</p>
    </header>

    <section class="summary-grid">
      <article class="card card-income">
        <h2>Доход</h2>
        <p class="amount" id="income-amount">0 ₽</p>
      </article>
      <article class="card card-expense">
        <h2>Расход</h2>
        <p class="amount" id="expense-amount">0 ₽</p>
      </article>
      <article class="card card-balance">
        <h2>Баланс</h2>
        <p class="amount" id="balance-amount">0 ₽</p>
      </article>
    </section>

    <section class="form-section">
      <h2>Добавить транзакцию</h2>
      <form id="transaction-form">
        <div class="form-group">
          <label for="transaction-type">Тип</label>
          <select id="transaction-type" required>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
          </select>
        </div>
        <div class="form-group">
          <label for="transaction-description">Описание</label>
          <input id="transaction-description" type="text" placeholder="Например: Зарплата или Продукты" required />
        </div>
        <div class="form-group">
          <label for="transaction-value">Сумма</label>
          <input id="transaction-value" type="number" placeholder="5000" min="0.01" step="0.01" required />
        </div>
        <button type="submit">Добавить</button>
      </form>
    </section>

    <section class="table-section">
      <h2>Транзакции</h2>
      <div class="table-actions">
        <button id="clear-all">Очистить всё</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Описание</th>
            <th>Тип</th>
            <th>Сумма</th>
            <th>Действие</th>
          </tr>
        </thead>
        <tbody id="transaction-table"></tbody>
      </table>
      <p class="note">Данные сохраняются в браузере и останутся при обновлении страницы.</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
