<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartBudget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="header-left">
        <h1 data-i18n="appTitle">SmartBudget</h1>
        <p data-i18n="appSubtitle">Управляйте доходами и расходами простым способом.</p>
      </div>
      <div class="header-right">
        <nav class="nav-links">
          <a href="index.html" data-i18n="navHome">Главная</a>
          <a href="profile.html" data-i18n="navProfile">Профиль</a>
        </nav>
        <div class="lang-switcher">
          <label for="language-select" data-i18n="languageLabel">Язык</label>
          <select id="language-select" class="lang-selector"></select>
        </div>
      </div>
    </header>

    <section class="summary-grid">
      <article class="card card-income">
        <h2 data-i18n="incomeTitle">Доход</h2>
        <p class="amount" id="income-amount">0 ₽</p>
      </article>
      <article class="card card-expense">
        <h2 data-i18n="expenseTitle">Расход</h2>
        <p class="amount" id="expense-amount">0 ₽</p>
      </article>
      <article class="card card-balance">
        <h2 data-i18n="balanceTitle">Баланс</h2>
        <p class="amount" id="balance-amount">0 ₽</p>
      </article>
    </section>

    <section class="form-section">
      <h2 data-i18n="addTransactionHeader">Добавить транзакцию</h2>
      <form id="transaction-form">
        <div class="form-group">
          <label for="transaction-type" data-i18n="labelType">Тип</label>
          <select id="transaction-type" required>
            <option value="income" data-i18n="incomeTitle">Доход</option>
            <option value="expense" data-i18n="expenseTitle">Расход</option>
          </select>
        </div>
        <div class="form-group">
          <label for="transaction-description" data-i18n="labelDescription">Описание</label>
          <input id="transaction-description" type="text" placeholder="Например: Зарплата или Продукты" required data-i18n-placeholder="placeholderDescription" />
        </div>
        <div class="form-group">
          <label for="transaction-value" data-i18n="labelValue">Сумма</label>
          <input id="transaction-value" type="number" placeholder="5000" min="0.01" step="0.01" required data-i18n-placeholder="placeholderValue" />
        </div>
        <button type="submit" data-i18n="addButton">Добавить</button>
      </form>
    </section>

    <section class="table-section">
      <h2 data-i18n="transactionsHeader">Транзакции</h2>
      <div class="table-actions">
        <button id="clear-all" data-i18n="clearAllButton">Очистить всё</button>
      </div>
      <table>
        <thead>
          <tr>
            <th data-i18n="columnDescription">Описание</th>
            <th data-i18n="columnType">Тип</th>
            <th data-i18n="columnAmount">Сумма</th>
            <th data-i18n="columnAction">Действие</th>
          </tr>
        </thead>
        <tbody id="transaction-table"></tbody>
      </table>
      <p class="note" data-i18n="noteText">Данные сохраняются в браузере и останутся при обновлении страницы.</p>
    </section>
  </div>

  <script src="translations.js"></script>
  <script src="script.js"></script>
</body>
</html>
